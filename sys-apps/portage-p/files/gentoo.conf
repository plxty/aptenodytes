[DEFAULT]
main-repo = gentoo

[gentoo]
priority = -1000
location = ${EPREFIX}/var/db/repos/gentoo
sync-type = git
sync-uri = https://mirrors.tuna.tsinghua.edu.cn/git/gentoo-portage.git
auto-sync = yes
sync-openpgp-key-path = ${EPREFIX}/usr/share/openpgp-keys/gentoo-release.asc
sync-openpgp-keyserver = https://keys.gentoo.org
sync-openpgp-key-refresh-retry-count = 40
sync-openpgp-key-refresh-retry-overal-timeout = 1200
sync-openpgp-key-refresh-retry-delay-exp-base = 2
sync-openpgp-key-refresh-retry-delay-max = 60
sync-openpgp-key-refresh-retry-delay-mult = 4
sync-git-verify-commit-signature = true
